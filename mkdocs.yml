# MkDocs configuration for Hacking Notes
# https://www.mkdocs.org/user-guide/configuration/

site_name: Hacking Notes
site_description: Notes for an ethical hacker.
site_author: benjugat
copyright: ""
# GitHub Pages project site URL
site_url: https://benjugat.github.io/hackingnotes/

repo_url: https://github.com/benjugat/hackingnotes
repo_name: benjugat/hackingnotes
edit_uri: edit/main/docs/

# Source and build directories
docs_dir: docs
site_dir: site

exclude_docs: |
  README.md

# Theme: Material for MkDocs
theme:
  name: material
  language: en
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.action.edit
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
  favicon: images/favicon.png
  logo: images/logo_rtnotes.png

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/benjugat
  generator: false

extra_css:
  - css/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 4
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
      auto_title: false
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.smartsymbols
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde

plugins:
  - search:
      lang: en
      separator: '[\s\-\.\_]+'

# Pretty URLs (/section/page/ without .html)
use_directory_urls: true

# Validation: warn on broken links, ignore external/absolute ones
validation:
  nav:
    omitted_files: ignore
    not_found: warn
    absolute_links: ignore
  links:
    not_found: ignore
    absolute_links: ignore
    unrecognized_links: ignore

